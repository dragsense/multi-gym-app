services:
  # Full-Stack Service (Backend + Frontend in one container)
  app:
    build:
      context: ..
      dockerfile: shared/Dockerfile
      target: prod
      no_cache: true
    container_name: formance-app-staging
    ports:
      - "3001:3000" # Backend port
    env_file:
      - ../backend/.env
    volumes:
      - app_logs:/app/logs
      - app_uploads:/app/backend/public/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mqtt:
        condition: service_started
    restart: unless-stopped
    networks:
      - app-network

  # Redis Cache
  redis:
    image: redis:latest
    container_name: formance-redis-staging
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app-network

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: formance-redis-commander-staging
    environment:
      - REDIS_HOSTS=local:formance-dragonfly-staging:6379
    ports:
      - "8081:8081"
    depends_on:
      - dragonfly
    restart: unless-stopped
    networks:
      - app-network

  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly:latest
    container_name: formance-dragonfly-staging
    restart: unless-stopped
    mem_limit: 6g # optional, matches Docker memory
    command: >
      dragonfly
      --maxmemory=5g # slightly less than container memory
    ports:
      - "6380:6379"
    networks:
      - app-network

  # PostgreSQL 17 Database
  postgres:
    image: postgres:17
    container_name: formance-postgres-staging
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-formance_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network


  # Mailpit for email testing
  mailpit:
    image: axllent/mailpit:latest
    container_name: formance-mailpit-staging
    restart: unless-stopped
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web UI
    networks:
      - app-network


volumes:
  postgres_data:
  redis_data:
  app_logs:
  app_uploads:

networks:
  app-network:
    driver: bridge

